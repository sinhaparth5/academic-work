<!doctype html>
<html lang="{{ site.LanguageCode | default `en` }}">
  <head>
    {{ partial "head.html" . }}
  </head>
  <body>
    {{ partial "site-header.html" . }}
    {{ block "main" . }}{{ end }}
    {{ partial "site-footer.html" . }}
    {{ with resources.Get "js/main.js" }}
    <script src="{{ .RelPermalink }}" defer></script>
    {{ end }}
  </body>
</html>
