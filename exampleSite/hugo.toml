baseURL      = "https://academic-works.astrareconslabs.com/"
languageCode = "en-gb"
title        = "Parth Sinha"
enableRobotsTXT = true
disableHugoGeneratorInject = true
cacheDir = "/tmp/hugo_cache"

[sitemap]
  changefreq = "weekly"
  filename   = "sitemap.xml"
  priority   = 0.5

[params]
  description  = "Academic homepage of Parth Sinha, researcher in Computer Science."
  author       = "Parth Sinha"
  tagline      = "Computer Science · Researcher"
  images       = ["/images/cover.png"]
  mainSections = ["research", "notes", "library", "projects"]
  email        = ""
  intro        = "I am a researcher in Computer Science. My work focuses on distributed systems, machine learning efficiency, and the formal foundations of concurrent computation."

[[params.social]]
  name = "GitHub"
  icon = "/images/socials/github-svgrepo-com.svg"
  url  = "https://github.com/sinhaparth5"

[[params.social]]
  name = "GitLab"
  icon = "/images/socials/gitlab-svgrepo-com.svg"
  url  = "https://gitlab.com/example"

[[params.social]]
  name = "Bitbucket"
  icon = "/images/socials/bitbucket-svgrepo-com.svg"
  url  = "https://bitbucket.org/example"

[[params.social]]
  name = "X"
  icon = "/images/socials/Twitter-X--Streamline-Bootstrap.svg"
  url  = "https://x.com/example"

[[params.social]]
  name = "Instagram"
  icon = "/images/socials/instagram-color-svgrepo-com.svg"
  url  = "https://instagram.com/example"

[[params.social]]
  name = "Facebook"
  icon = "/images/socials/facebook-svgrepo-com.svg"
  url  = "https://facebook.com/example"

[[params.social]]
  name = "WhatsApp"
  icon = "/images/socials/whatsapp-svgrepo-com.svg"
  url  = "https://wa.me/1234567890"

  [params.seo]
    siteName      = "Parth Sinha"
    twitterHandle = "@parthsinha"
    googleTagManagerID = "GTM-T9JN355V"
    googleAnalyticsID = "G-NG150921DW"
    cookieConsentBanner = true
    cookieConsentPrivacyURL = "/privacy/"
    defaultRobots = "index,follow"
    imageWidth    = 1200
    imageHeight   = 630


[permalinks]
  notes    = "/notes/~/:slug/"
  research = "/research/~/:slug/"
  library  = "/library/~/:slug/"
  projects = "/projects/~/:slug/"
  teaching = "/teaching/~/:slug/"

[mediaTypes]
  [mediaTypes."application/manifest+json"]
    suffixes = ["webmanifest"]

[outputFormats]
  [outputFormats.WebAppManifest]
    mediaType      = "application/manifest+json"
    baseName       = "site"
    rel            = "manifest"
    isHTML         = false
    notAlternative = false
  [outputFormats.SearchIndex]
    mediaType      = "application/json"
    baseName       = "search"
    rel            = "search"
    isPlainText    = true
    notAlternative = true

[outputs]
  home     = ["HTML", "RSS", "WebAppManifest", "SearchIndex"]
  section  = ["HTML", "RSS"]
  page     = ["HTML"]
  taxonomy = ["HTML"]
  term     = ["HTML"]
  404      = ["HTML"]

[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = false
    [markup.goldmark.extensions.passthrough]
      enable = true
      [markup.goldmark.extensions.passthrough.delimiters]
        block  = [["$$", "$$"]]
        inline = [["$", "$"]]

[taxonomies]
  tag = "tags"

[imaging]
  quality        = 85
  resampleFilter = "Lanczos"
